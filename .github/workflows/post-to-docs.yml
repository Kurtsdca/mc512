name: Post to MC512 Docs
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Filename'
        required: true
      content_b64:
        description: 'Base64-encoded Markdown content'
        required: true
      filepath:
        description: 'Path in repo'
        required: false
        default: 'docs/'
permissions:
  contents: write
jobs:
  post-document:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create directory if needed
        run: mkdir -p "${{ github.event.inputs.filepath }}"
      - name: Decode base64 content and write file
        run: |
          echo "${{ github.event.inputs.content_b64 }}" | base64 -d > "${{ github.event.inputs.filepath }}${{ github.event.inputs.filename }}"
      - name: Commit and push
        run: |
          git config user.name "MC512 Bot"
          git config user.email "bot@mc512.net"
          git add "${{ github.event.inputs.filepath }}${{ github.event.inputs.filename }}"
          git commit -m "Add/Update: ${{ github.event.inputs.filename }} [automated via MC512 node]"
          git push
