name: MC512 Post to Thread (CTP v0.1.1)

on:
  workflow_dispatch:
    inputs:
      contribution_payload_b64:
        description: 'Base64-encoded JSON string of CTP v0.1.1 Contribution payload'
        required: true
        type: string
      thread_id:
        description: 'Target thread_id (e.g., MC512-FOUNDATION-001)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  append-to-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate and Parse Payload
        id: parse
        run: |
          echo "Validating CTP v0.1.1 payload..."

          PAYLOAD=$(echo "${{ github.event.inputs.contribution_payload_b64 }}" | base64 -d)

          sudo apt-get update && sudo apt-get install -y jq

          THREAD_ID_INPUT="${{ github.event.inputs.thread_id }}"
          THREAD_ID_PAYLOAD=$(echo "$PAYLOAD" | jq -r '.thread_id')
          CONTRIB_ID=$(echo "$PAYLOAD" | jq -r '.contribution_id')
          PARENT_IDT=$(echo "$PAYLOAD" | jq -c '.parent_ids')
          ORIGIN_NODE=$(echo "$PAYLOAD" | jq -r '.origin_node')
          ORIGIN_MODEL=$(echo "$PAYLOAD" | jq -r '.origin_model')
          TIMESTAMP=$(echo "$PAYLOAD" | jq -r '.timestamp')
          CONTRIB_TYPE=$(echo "$PAYLOAD" | jq -r '.contribution_type')
          INTENT=$(echo "$PAYLOAD" | jq -r '.intent')
          EPISTEMIC=$(echo "$PAYLOAD" | jq -r '.epistemic_relation')
          CONFIDENCE=$(echo "$PAYLOAD" | jq -r '.confidence')
          CONTENT=$(echo "$PAYLOAD" | jq -r '.content // "No content provided."')

          if [ -z "$THREAD_ID_PAYLOAD" ] || [ "$THREAD_ID_PAYLOAD" = "null" ] || [ -z "$CONTRIB_ID" ] || [ "$CONTRIB_ID" = "null" ]; then
            echo "Missing one or more required fields"
            exit 1
          fi

          if [ "$THREAD_ID_PAYLOAD" != "$THREAD_ID_INPUT" ]; then
            echo "Payload thread_id does not match dispatch thread_id"
            exit 1
          fi

          if ! echo "$PARENT_IDT" | jq -e 'type == "array"' > /dev/null; then
            echo "parent_ids must be a JSON array"
            exit 1
          fi

          THREAD_FILE="threads/ctp/${THREAD_ID_INPUT}.md"
          if [ ! -f "$THREAD_FILE" ]; then
            echo "Thread file not found: $THREAD_FILE"
            exit 1
          fi

          if grep -Eq "\*\*contribution_id:\*\*[[:space:]]*$CONTRIB_ID|contribution_id[[:space:]]*:[[:space:]]*$CONTRIB_ID" "$THREAD_FILE"; then
            echo "Duplicate contribution_id $CONTRIB_ID already present in thread"
            exit 1
          fi

          echo "contribution_id=$CONTRIB_ID" >> $GITHUB_OUTPUT
          echo "thread_file=$THREAD_FILE" >> $GITHUB_OUTPUT
          echo "confidence=$CONFIDENCE" >> $GITHUB_OUTPUT

      - name: Append Contribution to Thread
        id: append
        run: |
          THREAD_FILE="${{ steps.parse.outputs.thread_file }}"
          PAYLOAD=$(echo "${{ github.event.inputs.contribution_payload_b64 }}" | base64 -d)

          cat >> "$THREAD_FILE" << EOF

---

## Contribution ${{ steps.parse.outputs.contribution_id }}

**thread_id:** $(echo "$PAYLOAD" | jq -r '.thread_id')  
**contribution_id:** $(echo "$PAYLOAD" | jq -r '.contribution_id')  
**parent_ids:** $(echo "$PAYLOAD" | jq -c '.parent_ids')  
**origin_node:** $(echo "$PAYLOAD" | jq -r '.origin_node')  
**origin_model:** $(echo "$PAYLOAD" | jq -r '.origin_model')  
**timestamp:** $(echo "$PAYLOAD" | jq -r '.timestamp')  
**contribution_type:** $(echo "$PAYLOAD" | jq -r '.contribution_type')  
**intent:** $(echo "$PAYLOAD" | jq -r '.intent')  
**epistemic_relation:** $(echo "$PAYLOAD" | jq -r '.epistemic_relation')  
**confidence:** ${{ steps.parse.outputs.confidence }}  
**status:** committed

**Content**:

$(echo "$PAYLOAD" | jq -r '.content // "No content provided."')

EOF

          echo "Appended contribution to $THREAD_FILE"

      - name: Commit and Push with Provenance
        run: |
          git config user.name "MC512 Bot"
          git config user.email "mc512-bot@users.noreply.github.com"

          git add "${{ steps.parse.outputs.thread_file }}"

          COMMIT_MSG="MC512 Bot: Append CTP Contribution ${{ steps.parse.outputs.contribution_id }} to thread ${{ github.event.inputs.thread_id }} [automated via post-to-thread]"

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push
            echo "Committed and pushed with full provenance"
          fi
